<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 54" fill="none" aria-label="V60 Brew Guide Logo" role="img">
  <title>V60 Brew Guide</title>
  <!-- Top rim/flange -->
  <rect x="2" y="2" width="44" height="8" rx="4" stroke="#3E2723" stroke-width="2.5"/>
  <!-- Cone body -->
  <path d="M6 10 L24 50 L42 10" stroke="#3E2723" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Spiral ribs -->
  <path d="M13 18 Q24 15.5 35 18" stroke="#3E2723" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.65"/>
  <path d="M16 26 Q24 23.5 32 26" stroke="#3E2723" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.5"/>
  <path d="M18 34 Q24 31.5 30 34" stroke="#3E2723" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.35"/>
  <!-- Bottom drip hole -->
  <circle cx="24" cy="50" r="3" fill="#3E2723"/>
</svg>
