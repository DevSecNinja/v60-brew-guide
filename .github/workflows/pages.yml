---
name: Pages

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - closed
    paths-ignore:
      - "**.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pages:
    uses: DevSecNinja/.github/.github/workflows/pages.yml@27fd66740c629ea38380dcd3bf93e7bc74c54247 # v1.9.0
    permissions:
      contents: read
      deployments: write
      id-token: write
      issues: write
      pages: write
      pull-requests: write
    with:
      # renovate: datasource=node-version depName=node
      node-version: "24"
      # renovate: datasource=npm depName=wrangler
      wrangler-version: "4.107.0"
      artifact-path: "."
      test-setup-command: npx playwright install webkit --with-deps
      test-command: |-
        npm run test:unit
        npm run test:html
        npm run test:a11y
        npm run test:e2e
      update-sitemap-lastmod: true
      # Optional Cloudflare production instead of GitHub Pages:
      # github-pages: false
      # cloudflare-production: true
      # cloudflare-project-name: "my-site"
      # Optional: deploy every main commit to an acceptance environment and
      # reserve production for releases. Also add the release trigger to `on:`
      # above, e.g. `release: { types: [published] }`.
      # cloudflare-acceptance: true
      # cloudflare-production-on-release: true
    secrets:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
